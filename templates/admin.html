<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Florería Chiapas</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="navbar-brand">Florería <span>Chiapas</span></a>
    <ul class="nav-links">
      <li><a href="/">Catálogo</a></li>
      <li><a href="/admin" class="active">Admin</a></li>
    </ul>
  </div>
</nav>

<section class="admin-page">
  <div class="container">
    <div class="admin-header">
      <h2>Panel de administración</h2>
      <button class="btn btn-primary" onclick="abrirModal()">+ Nuevo ramo</button>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab productos active" onclick="cambiarTabAdmin('productos')">Ramos</button>
      <button class="admin-tab pedidos" onclick="cambiarTabAdmin('pedidos')">Pedidos</button>
    </div>

    <div class="admin-content">
      <!-- populated by JS -->
    </div>
  </div>
</section>

<!-- Modal producto -->
<div class="modal-overlay" style="display:none">
  <div class="modal">
    <h3 id="modal-titulo">Nuevo ramo</h3>
    <form id="modal-form">
      <div class="form-group">
        <label for="m-nombre">Nombre</label>
        <input type="text" id="m-nombre" required>
      </div>
      <div class="form-group">
        <label for="m-descripcion">Descripción</label>
        <textarea id="m-descripcion" rows="3" required></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="m-precio">Precio (MXN)</label>
          <input type="number" id="m-precio" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label for="m-imagen">Imagen (archivo)</label>
          <input type="text" id="m-imagen" placeholder="ramos-default.jpg">
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
          <input type="checkbox" id="m-disponible" checked>
          Disponible en catálogo
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast (same as main page) -->
<script src="/static/js/main.js"></script>
</body>
</html>
